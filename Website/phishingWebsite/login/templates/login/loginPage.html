{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Phishing Awareness Platform</title>
    <link rel="stylesheet" href="{% static 'base.css' %}">

</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>PhishMe Platform</p>
            </div>

            <form id="loginForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
            
                <button type="button" class="login-button" onclick="submitLogin()">Login</button>
                <a href="{% url 'signup:signup' %}"><em>Don't have a company account? Sign up here.</em></a>
            </form>
        </div>
    </div>

            <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

            <script>
 
                // Get CSRF token from the hidden input
                const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
                const csrfToken = csrfInput ? csrfInput.value : '';

                function sanitize(string) {
                    const map = {
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        '"': '&quot;',
                        "'": '&#x27;',
                        "/": '&#x2F;',
                    };
                    const reg = /[&<>"'/]/ig;
                    return string.replace(reg, (match) => map[match]);
                }
                // Function to authenticate the log-in.
                async function submitLogin() {
                    try {
                        const email = sanitize(document.getElementById('email').value);
                        const password = sanitize(document.getElementById('password').value);

                        if (!email || !password) {
                            return;
                        }

                        // Hashes the password, which can be used to authenticate the user.
                        const hashedPassword = CryptoJS.SHA512(password).toString();
                        

                        const formData = new FormData();
                        formData.append('email', email);
                        formData.append('password', hashedPassword);

                        try {
                            const response = await fetch("{% url 'login:index' %}", {
                                method: "POST",
                                headers: {
                                    'X-CSRFToken': csrfToken
                                },
                                body: formData
                            });
                            
                            if (response.redirected) {
                                window.location.href = response.url;
                                return;
                            }

                            if (!response.ok) {
                                const text = await response.text();
                                return;
                            }

                            const text = await response.text();
                            console.log("Success:", text);
                        } catch (fetchError) {
                            console.error('Fetch error:', fetchError);
                        }

                    } catch (error) {
                        console.error(error);
                    }
                }
            </script>
        </div>
    </div>
</body>
</html>

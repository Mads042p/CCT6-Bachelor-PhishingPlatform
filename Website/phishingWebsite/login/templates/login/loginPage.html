{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Phishing Awareness Platform</title>
    <link rel="stylesheet" href="{% static 'base.css' %}">

</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>PhishMe Platform</p>
            </div>

            <form id="loginForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
            
                <button type="button" class="login-button" onclick="submitLogin()">Login</button>
            </form>
        </div>
    </div>

            <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

            <script>
                // Get CSRF token from the hidden input
                const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
                const csrfToken = csrfInput ? csrfInput.value : '';

                function sanitize(string) {
                    const map = {
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        '"': '&quot;',
                        "'": '&#x27;',
                        "/": '&#x2F;',
                    };
                    const reg = /[&<>"'/]/ig;
                    return string.replace(reg, (match) => map[match]);
                }

                async function submitLogin() {
                    try {
                        const email = sanitize(document.getElementById('email').value);
                        const password = sanitize(document.getElementById('password').value);

                        if (!email || !password) {
                            alert("All fields are required.");
                            return;
                        }

                        // Hash password correctly (string!)
                        const hashedPassword = CryptoJS.SHA512(password).toString();

                        const formData = new FormData();
                        formData.append('email', email);
                        formData.append('password', hashedPassword);

                        fetch("{% url 'login:index' %}", {
                            method: "POST",
                            headers: {
                                'X-CSRFToken': csrfToken
                            },
                            body: formData
                        })
                        .then(response => {
                            if (response.redirected) {
                                window.location.href = response.url;
                                return;
                            }

                            if (!response.ok) {
                                return response.text().then(text => {
                                    alert("Error: " + text);
                                });
                            }

                            return response.text().then(text => {
                                console.log("Success:", text);
                            });
                        })
                        .catch(error => {
                            console.error('Fetch error:', error);
                            alert('An error occurred. Please try again.');
                        });

                    } catch (error) {
                        console.error(error);
                        alert("An unexpected error occurred. Please try again.");
                    }
                }
            </script>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <h1>Login</h1>

    <form id="loginForm">
        {% csrf_token %}

        <label for="email">Email</label>
        <input type="text" id="email" name="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="button" onclick="submitLogin()">Login</button>
    </form>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        // Get CSRF token from the hidden input
        const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
        const csrfToken = csrfInput ? csrfInput.value : '';

        function sanitize(string) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#x27;',
                "/": '&#x2F;',
            };
            const reg = /[&<>"'/]/ig;
            return string.replace(reg, (match) => map[match]);
        }

        async function submitLogin() {
            try {
                const email = sanitize(document.getElementById('email').value);
                const password = sanitize(document.getElementById('password').value);

                if (!email || !password) {
                    alert("All fields are required.");
                    return;
                }

                // Hash password correctly (string!)
                const hashedPassword = CryptoJS.SHA512(password).toString();

                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', hashedPassword);

                fetch("{% url 'login:index' %}", {
                    method: "POST",
                    headers: {
                        'X-CSRFToken': csrfToken
                    },
                    body: formData
                })
                .then(response => {
                    if (response.redirected) {
                        window.location.href = response.url;
                        return;
                    }

                    if (!response.ok) {
                        return response.text().then(text => {
                            alert("Error: " + text);
                        });
                    }

                    return response.text().then(text => {
                        console.log("Success:", text);
                    });
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    alert('An error occurred. Please try again.');
                });

            } catch (error) {
                console.error(error);
                alert("An unexpected error occurred. Please try again.");
            }
        }
    </script>
</body>
</html>

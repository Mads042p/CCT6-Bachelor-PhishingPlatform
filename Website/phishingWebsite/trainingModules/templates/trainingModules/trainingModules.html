{% load static %}
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Training Modules</title>
	<link rel="stylesheet" href="{% static 'base.css' %}">
	<style>
		.user-profile {
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}
	</style>
</head>
<body>
<div class="app">
	<header class="app-header">
		<div class="app-header-logo">
			<a href="/">
				<div class="logo">
					<span class="logo-icon">
						<img src="https://assets.codepen.io/285131/almeria-logo.svg" />
					</span>
					<h1 class="logo-title">
						<span>PhishMe</span>
						<span>Platform</span>
					</h1>
				</div>
			</a>
		</div>
		<div class="app-header-navigation">
			<div class="tabs">
				<a href="#" onclick="goToAchievements()">
					Achievements
				</a>
				<a href="#" onclick="goToLeaderboard()">
					Leaderboard
				</a>
				<a href="#" onclick="goToModules()">
					Training Modules
				</a>
				<a href="#" onclick="goToAdminDashboard()">
					Admin Dashboard
				</a>
			</div>
		</div>
		<div class="app-header-actions">
			<div class="user-profile">
				<span onclick="goToDashboard()">{{ username }}</span>
				<button class="logout-button" onclick="logout()">Log out</button>
			</div>
		</div>
		<div class="app-header-mobile">
			<button class="icon-button large">
				<i class="ph-list"></i>
			</button>
		</div>

	</header>
    <div class="app-body">
        <div></div>
		<div>
			<h1>Training Modules</h1>
			<ul class="training-card-list">
				<li class="training-card">
					<a href="{% url 'trainingModules:staticTraining' %}">
						<div class="training-card-content">
							<h3>Phishing</h3>
							<p>Learn what phishing is</p>
						</div>
					</a>
				</li>
				<li class="training-card">
					<a href="{% url 'trainingModules:phishingExplained' %}">
						<div class="training-card-content">
							<h3>Phishing Quiz</h3>
							<p>Test your phishing knowledge</p>
						</div>
					</a>
				</li>
		
				<li class="training-card">
					<a href="{% url 'trainingModules:emailTraining' %}">
						<div class="training-card-content">
							<h3>Email Training</h3>
							<p>Try to identify phishing emails</p>
						</div>
					</a>
				</li>
		
			</ul>
		</div>
        <div></div>
    </div>
</div>
</body>
</html>


<script>
    function goToAchievements() {
        window.location.href = "{% url 'trainingModules:goToAchievements' %}";
    }
	function goToLeaderboard() {
		window.location.href = "{% url 'trainingModules:goToLeaderboard' %}";
	}
	function goToModules() {
		window.location.href = "{% url 'trainingModules:goToModules' %}";
	}
	function goToAdminDashboard() {
		window.location.href = "{% url 'trainingModules:goToAdminDashboard' %}";
	}
	function goToDashboard() {
		window.location.href = "{% url 'trainingModules:goToDashboard' %}";
	}
	function logout() {
		window.location.href = "{% url 'login:logout' %}";
	}
</script>

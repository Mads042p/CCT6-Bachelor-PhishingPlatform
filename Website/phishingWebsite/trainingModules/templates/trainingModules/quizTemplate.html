{% load static %}
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Training Modules</title>
	<link rel="stylesheet" href="{% static 'base.css' %}">
	<style>
		.user-profile {
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}
	</style>
</head>
<body>
<div class="app">
	<header class="app-header">
		<div class="app-header-logo">
			<a href="/">
				<div class="logo">
					<span class="logo-icon">
						<img src="https://assets.codepen.io/285131/almeria-logo.svg" />
					</span>
					<h1 class="logo-title">
						<span>PhishMe</span>
						<span>Platform</span>
					</h1>
				</div>
			</a>
		</div>
		<div class="app-header-navigation">
			<div class="tabs">
				<a href="#" onclick="goToAchievements()">
					Achievements
				</a>
				<a href="#" onclick="goToLeaderboard()">
					Leaderboard
				</a>
				<a href="#" onclick="goToModules()">
					Training Modules
				</a>
				<a href="#" onclick="goToAdminDashboard()">
					Admin Dashboard
				</a>
			</div>
		</div>
		<div class="app-header-actions">
			<div class="user-profile">
				<span onclick="goToDashboard()">{{ username }}</span>
				<button class="logout-button" onclick="logout()">Log out</button>
			</div>
		</div>
		<div class="app-header-mobile">
			<button class="icon-button large">
				<i class="ph-list"></i>
			</button>
		</div>

	</header>
	<div class="app-body">
		<div></div>
		<body>
			<div id="quiz">
				<h1>Interactive Quiz</h1>
				<div id="question"></div>

				<div id="options"></div>
				<div id="errorMsg" style="color: red; margin-top: 1rem; display: none;"></div>
			</div>
		</body>
		<div></div>
	</div>
</div>
<!-- Embed quiz data as JSON in the template -->
{{ quizData|json_script:"quiz-data" }}
</body>
</html>

<script>
	// Load quiz data from the template
	try {
		const quizDataElement = document.getElementById("quiz-data");
		if (!quizDataElement) {
			throw new Error('Quiz data element not found');
		}
		
		const quizData = JSON.parse(quizDataElement.textContent);
		if (!Array.isArray(quizData) || quizData.length === 0) {
			throw new Error('Invalid quiz data');
		}

		const questionElement = document.getElementById("question");
		const optionsElement = document.getElementById("options");
		const errorMsg = document.getElementById("errorMsg");

		let currentQuestion = 0;
		let score = 0;

		// Function to display the current question and options
		function showQuestion() {
			try {
				errorMsg.style.display = 'none';
				
				if (currentQuestion >= quizData.length) {
					showScore();
					return;
				}
				
				const question = quizData[currentQuestion];
				if (!question) {
					throw new Error('Question data missing');
				}
				
				questionElement.innerText = question.question || 'Question';

				optionsElement.innerHTML = "";
				if (!question.options || !Array.isArray(question.options)) {
					throw new Error('Options data missing');
				}
				
				question.options.forEach(option => {
					const button = document.createElement("button");
					button.classList.add('login-button');
					button.innerText = option;
					optionsElement.appendChild(button);
					button.addEventListener("click", selectAnswer);
				});
			} catch (error) {
				console.error('Error displaying question:', error);
				errorMsg.innerText = 'Error loading question. Please refresh the page.';
				errorMsg.style.display = 'block';
			}
		}
		
		// Function to handle answer selection and provide feedback from the quiz data
		function selectAnswer(e) {
			try {
				const selectedButton = e.target;
				const question = quizData[currentQuestion];
				if (!question) throw new Error('Question data missing');
				
				const answer = question.answer;
				optionsElement.innerHTML = "";
				const feedback = document.createElement("p");
				feedback.classList.add('body');

				if (selectedButton.innerText === answer) {
					score++;
					feedback.innerText = question.answerCorrect || "Correct!";
				} else {
					feedback.innerText = question.answerWrong || "Incorrect, try again.";
				}

				optionsElement.appendChild(feedback);
				const nextButton = document.createElement("button");
				nextButton.classList.add('logout-button');
				nextButton.innerText = "Next Question";
				optionsElement.appendChild(nextButton);
				nextButton.addEventListener("click", showResult);
			} catch (error) {
				console.error('Error in selectAnswer:', error);
				errorMsg.innerText = 'Error processing your answer. Please try again.';
				errorMsg.style.display = 'block';
			}
		}

		//Only show th score, when the quiz is finished
		function showResult() {
			try {
				currentQuestion++;

				if (currentQuestion < quizData.length) {
					showQuestion();
				} else {
					showScore();
				}
			} catch (error) {
				console.error('Error in showResult:', error);
				errorMsg.innerText = 'An error occurred. Please refresh the page.';
				errorMsg.style.display = 'block';
			}
		}
		
		// Function to display the final score and a button to return to the modules page, and send the score to the server
		function showScore() {
			try {
				const quiz = document.getElementById('quiz');
				quiz.innerHTML = `
    		<h1>Quiz Completed!</h1>
    		<p>Your score: ${score}/${quizData.length}</p>
			`;
				
				const returnButton = document.createElement("button");
				returnButton.classList.add('logout-button');
				returnButton.innerText = "Return to Modules";
				quiz.appendChild(returnButton);
				returnButton.addEventListener("click", goToModules);

				try {
					fetch("{% url 'trainingModules:updateUserScore' %}", {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
							"X-CSRFToken": "{{ csrf_token }}"
						},
						body: JSON.stringify({
							quizID: "Module1",
							score: score,
							total: quizData.length
						})
					}).catch(error => {
						console.error('Error sending score:', error);
					});
				} catch (fetchError) {
					console.error('Error submitting score:', fetchError);
				}
			} catch (error) {
				console.error('Error in showScore:', error);
				document.getElementById('quiz').innerHTML = '<p>Error displaying score. Please refresh the page.</p>';
			}
		}

		showQuestion();
		
	} catch (initError) {
		console.error('Error initializing quiz:', initError);
		document.getElementById('quiz').innerHTML = '<p>Error loading quiz data. Please refresh the page.</p>';
	}
</script>

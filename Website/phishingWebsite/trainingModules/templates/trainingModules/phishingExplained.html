{% load static %}
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Training Modules</title>
	<link rel="stylesheet" href="{% static 'base.css' %}">
	<style>
		.user-profile {
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}
	</style>
</head>
<body>
<div class="app">
	<header class="app-header">
		<div class="app-header-logo">
			<a href="/">
				<div class="logo">
					<span class="logo-icon">
						<img src="https://assets.codepen.io/285131/almeria-logo.svg" />
					</span>
					<h1 class="logo-title">
						<span>PhishMe</span>
						<span>Platform</span>
					</h1>
				</div>
			</a>
		</div>
		<div class="app-header-navigation">
			<div class="tabs">
				<a href="#" onclick="goToAchievements()">
					Achievements
				</a>
				<a href="#" onclick="goToLeaderboard()">
					Leaderboard
				</a>
				<a href="#" onclick="goToModules()">
					Training Modules
				</a>
				<a href="#" onclick="goToAdminDashboard()">
					Admin Dashboard
				</a>
			</div>
		</div>
		<div class="app-header-actions">
			<div class="user-profile">
				<span onclick="goToDashboard()">{{ username }}</span>
				<button class="logout-button" onclick="logout()">Log out</button>
			</div>
		</div>
		<div class="app-header-mobile">
			<button class="icon-button large">
				<i class="ph-list"></i>
			</button>
		</div>

	</header>
	<div class="app-body">
		<div></div>
		<body>
			<div id="quiz">
				<h1>Interactive Quiz</h1>
				<div id="question"></div>

				<div id="options"></div>
			</div>
		</body>
		<div></div>
	</div>
</div>
{{ quizData|json_script:"quiz-data" }}
</body>
</html>

<script>
	const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    console.log(quizData);

	const questionElement = document.getElementById("question");
	const optionsElement = document.getElementById("options");	

	let currentQuestion = 0;
	let score = 0;

	function showQuestion() {
		const question = quizData[currentQuestion];
		questionElement.innerText = question.question;

		optionsElement.innerHTML = "";
		question.options.forEach(option => {
			const button = document.createElement("button");
			button.classList.add('login-button');
			button.innerText = option;
			optionsElement.appendChild(button);
			button.addEventListener("click", selectAnswer);
		});
	}

	function selectAnswer(e) {
		const selectedButton = e.target;
		const answer = quizData[currentQuestion].answer;
		optionsElement.innerHTML = "";
		const feedback = document.createElement("p");
		feedback.classList.add('body');

		if (selectedButton.innerText === answer) {
			score++;
			feedback.innerText = "That was correct yippie!";
		} else {
			feedback.innerText = "That was wrong womp womp";
		}

		optionsElement.appendChild(feedback);
		const nextButton = document.createElement("button");
		nextButton.classList.add('logout-button');
		nextButton.innerText = "Next Question";
		optionsElement.appendChild(nextButton);
		nextButton.addEventListener("click", showResult);
	}

function showResult() {
	currentQuestion++;

	if (currentQuestion < quizData.length) {
		showQuestion();
	} else {
		showScore();
	}
}

	function showScore() {
		quiz.innerHTML = `
    	<h1>Quiz Completed!</h1>
    	<p>Your score: ${score}/${quizData.length}</p>
		`;
	}

	showQuestion();
</script>

<script>
    function goToAchievements() {
        window.location.href = "{% url 'trainingModules:goToAchievements' %}";
    }
	function goToLeaderboard() {
		window.location.href = "{% url 'trainingModules:goToLeaderboard' %}";
	}
	function goToModules() {
		window.location.href = "{% url 'trainingModules:goToModules' %}";
	}
	function goToAdminDashboard() {
		window.location.href = "{% url 'trainingModules:goToAdminDashboard' %}";
	}
	function goToDashboard() {
		window.location.href = "{% url 'trainingModules:goToDashboard' %}";
	}
	function logout() {
		window.location.href = "{% url 'login:logout' %}";
	}
</script>

{% load static %}
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Training Modules</title>
	<link rel="stylesheet" href="{% static 'base.css' %}">
	<style>
		.user-profile {
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}
	</style>
</head>
<body>
<div class="app">
	<header class="app-header">
		<div class="app-header-logo">
			<a href="/">
				<div class="logo">
					<span class="logo-icon">
						<img src="https://assets.codepen.io/285131/almeria-logo.svg" />
					</span>
					<h1 class="logo-title">
						<span>PhishMe</span>
						<span>Platform</span>
					</h1>
				</div>
			</a>
		</div>
		<div class="app-header-navigation">
			<div class="tabs">
				<a href="#" onclick="goToAchievements()">
					Achievements
				</a>
				<a href="#" onclick="goToLeaderboard()">
					Leaderboard
				</a>
				<a href="#" onclick="goToModules()">
					Training Modules
				</a>
				<a href="#" onclick="goToAdminDashboard()">
					Admin Dashboard
				</a>
			</div>
		</div>
		<div class="app-header-actions">
			<div class="user-profile">
				<span onclick="goToDashboard()">{{ username }}</span>
				<button class="logout-button" onclick="logout()">Log out</button>
			</div>
		</div>
		<div class="app-header-mobile">
			<button class="icon-button large">
				<i class="ph-list"></i>
			</button>
		</div>

	</header>
	<div class="app-body">
		<div></div>
		<body>
			<div id="quiz">
				<h1>Interactive Quiz</h1>
				<div id="question"></div>

				<div id="options"></div>
			</div>
		</body>
		<div></div>
	</div>
</div>
{{ quizData|json_script:"quiz-data" }}
</body>
</html>

<script>
	// Get the and quiz data and initialize the score 
	try {
		const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
		const questionElement = document.getElementById("question");
		const optionsElement = document.getElementById("options");  
		let currentQuestion = 0;
		let score = 0;

		// Function to rendering the current quiz question and its answer options into the UI
		function showQuestion() {
			try {
				if (!quizData || currentQuestion >= quizData.length) {
					showScore();
					return;
				}
				
				const question = quizData[currentQuestion];
				if (!question) {
					console.error('Question data missing');
					return;
				}
				
				questionElement.innerText = question.question || 'Question';

				optionsElement.innerHTML = "";
				if (question.options && Array.isArray(question.options)) {
					question.options.forEach(option => {
						const button = document.createElement("button");
						button.classList.add('login-button');
						button.innerText = option;
						optionsElement.appendChild(button);
						button.addEventListener("click", selectAnswer);
					});
				}
			} catch (error) {
				console.error('Error displaying question:', error);
				questionElement.innerText = 'Error loading question. Please refresh the page.';
			}
		}

		//Function that updates the quiz, checks what the user answered and updates the score.
		function selectAnswer(e) {
			try {
				const selectedButton = e.target;
				const question = quizData[currentQuestion];
				const answer = question ? question.answer : null;
				optionsElement.innerHTML = "";
				const feedback = document.createElement("p");
				feedback.classList.add('body');

				if (selectedButton.innerText === answer) {
					score++;
					feedback.innerText = question.answerCorrect || "Correct!";
				} else {
					feedback.innerText = question.answerWrong || "Incorrect, try again.";
				}

				optionsElement.appendChild(feedback);
				const nextButton = document.createElement("button");
				nextButton.classList.add('logout-button');
				nextButton.innerText = "Next Question";
				optionsElement.appendChild(nextButton);
				nextButton.addEventListener("click", showResult);
			} catch (error) {
				console.error('Error in selectAnswer:', error);
				optionsElement.innerHTML = '<p>Error processing your answer. Please try again.</p>';
			}
		}

	function showResult() {
		try {
			currentQuestion++;

			if (currentQuestion < quizData.length) {
				showQuestion();
			} else {
				showScore();
			}
		} catch (error) {
			console.error('Error in showResult:', error);
		}
	}

	function showScore() {
		try {
			document.getElementById('quiz').innerHTML = `
    	<h1>Quiz Completed!</h1>
    	<p>Your score: ${score}/${quizData.length}</p>
		`;
			
			const quiz = document.getElementById('quiz');
			const returnButton = document.createElement("button");
			returnButton.classList.add('logout-button');
			returnButton.innerText = "Return to Modules";
			quiz.appendChild(returnButton);
			returnButton.addEventListener("click", goToModules);

			try {
				fetch("{% url 'trainingModules:updateUserScore' %}", {
					method: "POST",
					headers: {
						"Content-Type": "application/json",
						"X-CSRFToken": "{{ csrf_token }}"
					},
					body: JSON.stringify({
						quizID: "Module1",
						score: score,
						total: quizData.length
					})
				}).catch(error => {
					console.error('Error sending score:', error);
				});
			} catch (error) {
				console.error('Error submitting score:', error);
			}
		} catch (error) {
			console.error('Error in showScore:', error);
			document.getElementById('quiz').innerHTML = '<p>Error displaying score. Please refresh the page.</p>';
		}
	}

	showQuestion();
} catch (error) {
	console.error('Error initializing quiz:', error);
	document.getElementById('quiz').innerHTML = '<p>Error loading quiz data. Please refresh the page.</p>';
}
<script>
    function goToAchievements() {
        try {
            window.location.href = "{% url 'trainingModules:goToAchievements' %}";
        } catch (error) {
            console.error('Error navigating:', error);
        }
    }
    function goToLeaderboard() {
        try {
            window.location.href = "{% url 'trainingModules:goToLeaderboard' %}";
        } catch (error) {
            console.error('Error navigating:', error);
        }
    }
    function goToModules() {
        try {
            window.location.href = "{% url 'trainingModules:goToModules' %}";
        } catch (error) {
            console.error('Error navigating:', error);
        }
    }
    function goToAdminDashboard() {
        try {
            window.location.href = "{% url 'trainingModules:goToAdminDashboard' %}";
        } catch (error) {
            console.error('Error navigating:', error);
        }
    }
    function goToDashboard() {
        try {
            window.location.href = "{% url 'trainingModules:goToDashboard' %}";
        } catch (error) {
            console.error('Error navigating:', error);
        }
    }
    function logout() {
        try {
            window.location.href = "{% url 'login:logout' %}";
        } catch (error) {
            console.error('Error logging out:', error);
        }
    }
</script>

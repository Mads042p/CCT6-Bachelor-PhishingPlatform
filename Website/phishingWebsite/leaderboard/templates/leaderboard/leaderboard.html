{% load static %}
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Leaderboard</title>
	<link rel="stylesheet" href="{% static 'base.css' %}">
	<style>
		.leaderboard-shell {
			max-width: 760px;
			margin: 0 auto;
			padding: 2rem 0 0;
		}

		.leaderboard-card {
			background: linear-gradient(180deg, rgba(69, 255, 188, 0.08), rgba(255, 255, 255, 0.02));
			border: 1px solid rgba(255, 255, 255, 0.08);
			border-radius: 24px;
			padding: 1.5rem;
			box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
		}

		.leaderboard-header {
			display: flex;
			justify-content: space-between;
			gap: 1rem;
			align-items: end;
			margin-bottom: 1.5rem;
		}

		.leaderboard-header h1 {
			margin: 0;
			font-size: 2.4rem;
		}

		.leaderboard-header p {
			margin: 0.35rem 0 0;
			color: var(--c-text-tertiary);
		}

		.leaderboard-list {
			display: grid;
			gap: 0.85rem;
			list-style: none;
			padding: 0;
			margin: 0;
		}

		.leaderboard-item {
			display: grid;
			grid-template-columns: 72px 1fr auto;
			align-items: center;
			gap: 1rem;
			padding: 1rem 1.1rem;
			border-radius: 18px;
			background: rgba(255, 255, 255, 0.04);
			border: 1px solid rgba(255, 255, 255, 0.06);
		}

		.leaderboard-rank {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 56px;
			height: 56px;
			border-radius: 18px;
			background: rgba(69, 255, 188, 0.12);
			color: var(--c-white);
			font-size: 1.15rem;
			font-weight: 700;
		}

		.leaderboard-name {
			font-size: 1.05rem;
			font-weight: 600;
		}

		.leaderboard-points {
			color: var(--c-green-500);
			font-weight: 700;
			font-size: 1.05rem;
		}

		.leaderboard-empty {
			padding: 1.5rem;
			border-radius: 18px;
			background: rgba(255, 255, 255, 0.04);
			color: var(--c-text-tertiary);
		}

		@media (max-width: 700px) {
			.leaderboard-header,
			.leaderboard-item {
				grid-template-columns: 1fr;
			}

			.leaderboard-item {
				justify-items: start;
			}
		}

		.user-profile {
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}
	</style>
</head>
<body>
<div class="app">
	<header class="app-header">
		<div class="app-header-logo">
			<a href="/">
				<div class="logo">
					<span class="logo-icon">
						<img src="https://assets.codepen.io/285131/almeria-logo.svg" />
					</span>
					<h1 class="logo-title">
						<span>PhishMe</span>
						<span>Platform</span>
					</h1>
				</div>
			</a>
		</div>
		<div class="app-header-navigation">
			<div class="tabs">
				<a href="#" onclick="goToAchievements()">
					Achievements
				</a>
				<a href="#" onclick="goToLeaderboard()">
					Leaderboard
				</a>
				<a href="#" onclick="goToModules()">
					Training Modules
				</a>
				<a href="#" onclick="goToAdminDashboard()">
					Admin Dashboard
				</a>
			</div>
		</div>
		<div class="app-header-actions">
			<div class="user-profile">
				<span onclick="goToDashboard()">{{ username }}</span>
				<button class="logout-button" onclick="logout()">Log out</button>
			</div>
		</div>
		<div class="app-header-mobile">
			<button class="icon-button large">
				<i class="ph-list"></i>
			</button>
		</div>

	</header>
    <div class="app-body">
        <div></div>
		<div class="leaderboard-shell">
			<div class="leaderboard-card">
				<div class="leaderboard-header">
					<div>
						<h1>Leaderboard</h1>
						<p></p>
					</div>
				</div>

				<script id="leaderboard-data" type="application/json">{{ leaderboard_data_json|safe }}</script>

				<ol class="leaderboard-list" id="leaderboard-list"></ol>
				<div class="leaderboard-empty" id="leaderboard-empty" hidden>No leaderboard entries available.</div>
			</div>
        </div>
        <div></div>
    </div>
</div>
</body>
</html>


<script>
    function goToAchievements() {
        try {
            window.location.href = "{% url 'leaderboard:goToAchievements' %}";
        } catch (error) {
            console.error('Error navigating to achievements:', error);
            alert('An error occurred. Please try again.');
        }
    }
    function goToLeaderboard() {
        try {
            window.location.href = "{% url 'leaderboard:goToLeaderboard' %}";
        } catch (error) {
            console.error('Error navigating to leaderboard:', error);
            alert('An error occurred. Please try again.');
        }
    }
    function goToModules() {
        try {
            window.location.href = "{% url 'leaderboard:goToModules' %}";
        } catch (error) {
            console.error('Error navigating to modules:', error);
            alert('An error occurred. Please try again.');
        }
    }
    function goToAdminDashboard() {
        try {
            window.location.href = "{% url 'leaderboard:goToAdminDashboard' %}";
        } catch (error) {
            console.error('Error navigating to admin dashboard:', error);
            alert('You do not have permission to access the admin dashboard.');
        }
    }
    function goToDashboard() {
        try {
            window.location.href = "{% url 'leaderboard:goToDashboard' %}";
        } catch (error) {
            console.error('Error navigating to dashboard:', error);
            alert('An error occurred. Please try again.');
        }
    }
    function logout() {
        try {
            window.location.href = "{% url 'login:logout' %}";
        } catch (error) {
            console.error('Error logging out:', error);
            alert('An error occurred during logout. Please try again.');
        }
    }
	// Gets the leaderboard data and post its into the website.
	const leaderboardDataElement = document.getElementById('leaderboard-data');
	const leaderboardList = document.getElementById('leaderboard-list');
	
	try {
		if (leaderboardDataElement && leaderboardDataElement.textContent) {
			const leaderboardData = JSON.parse(leaderboardDataElement.textContent);
			
			if (Array.isArray(leaderboardData) && leaderboardData.length > 0) {
				leaderboardData.forEach((entry, index) => {
					if (entry && entry.name && typeof entry.points !== 'undefined') {
						const li = document.createElement('li');
						li.className = 'leaderboard-item';
						li.innerHTML = `
							<div class="leaderboard-rank">${index + 1}</div>
							<div class="leaderboard-name">${entry.name || 'Unknown'}</div>
							<div class="leaderboard-points">${entry.points || 0} pts</div>
						`;
						leaderboardList.appendChild(li);
					}
				});
			} else {
				document.getElementById('leaderboard-empty').hidden = false;
			}
		} else {
			console.warn('Leaderboard data not found or empty');
			document.getElementById('leaderboard-empty').hidden = false;
		}
	} catch (error) {
		console.error('Error loading leaderboard data:', error);
		document.getElementById('leaderboard-empty').hidden = false;
	}
	const leaderboardEmpty = document.getElementById('leaderboard-empty');
	const leaderboardData = leaderboardDataElement ? JSON.parse(leaderboardDataElement.textContent || '[]') : [];

	if (!leaderboardData.length) {
		leaderboardEmpty.hidden = false;
	} else {
		leaderboardList.innerHTML = leaderboardData.map((entry, index) => `
			<li class="leaderboard-item">
				<span class="leaderboard-rank">${index + 1}</span>
				<span class="leaderboard-name">${entry.name}</span>
				<span class="leaderboard-points">${entry.points} points</span>
			</li>
		`).join('');
	}

	

</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Creation</title>
</head>
<body>
    <div class="company-creation-container">
        <h2><em>Company Creation</em></h2>
        <form  id="companyCreationForm">
        {% csrf_token %}
        
        <label for="companyName"><em>Company Name</em></label>
        <input type="text" id="companyName" name="companyName" required>
        <br>
        <label for="CVRnr"><em>CVR Number</em></label>
        <input type="number" id="CVRnr" name="CVRnr" required>
        <br>
        <label for="adminEmail"><em>Admin Email</em></label>
        <input type="email" id="adminEmail" name="adminEmail" required>
        
        <button type="button" onclick="createCompanyCode()" ><em>Create Company</em></button>
            <br>
            <!-- Skift /signup til det rigtige link -->
            <br>
                <a href="{% url 'signup:signup' %}"><em>Back</em></a>
        </form>
    </div>
</body>
</html> 

<script src = "https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
    
    function sanitize(string) {
        /*
        Sanitizes the input for javaScript
        */
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#x27;',
                "/": '&#x2F;',
            };
            const reg = /[&<>"'/]/ig;
            return string.replace(reg, (match)=>(map[match]));
        }
        
        
        async function createCompanyCode(){
            
            const company = document.getElementById("companyName").value;
            const email = document.getElementById("adminEmail").value;
            const companyCode = company.slice(0, 4) + Math.floor(1000 + Math.random()*9000);
            const CVRNumber = document.getElementById("CVRnr").value;
            const derivedKey = await deriveKey(email, companyCode);
            const encryptedEmail = await encryptData(email, derivedKey);
            console.log("encryptedEmail:", encryptedEmail);

            const hex = Array.from(encryptedEmail.encryptedData)
                .map(b => b.toString(16).padStart(2, "0"))
                    .join("");

                console.log(hex);
            
            const decrypted = await decryptMessage(
                derivedKey,
                encryptedEmail.encryptedData,
                encryptedEmail.iv
            );
            const decoder = new TextDecoder("utf-8");
            console.log("decryptedEmail:", decoder.decode(decrypted));

            const formData = new FormData();
            formData.append('companyCode', companyCode);
            formData.append('companyName', company);
            formData.append('encryptedEmail', Array.from(encryptedEmail.encryptedData).map(b => b.toString(16).padStart(2, "0")).join(""));
            formData.append('iv', Array.from(encryptedEmail.iv).map(b => b.toString(16).padStart(2, "0")).join(""));
            formData.append('CVRNumber', CVRNumber);
            
            fetch("{% url 'signup:createCompany' %}", {
                method: "POST",
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: formData
            })
            .then(response => {
                if (response.redirected) {

                    alert("Company code created successfully! Your company code is: " + companyCode + ". Please save this code for future reference. \nRedirecting to Sign Up page");

                    window.location.href = response.url;
                }
            })
            .catch(error => {
                console.error('Error creating company code:', error);
                alert('An error occurred while creating the company code. Please try again.');
            });
            
        }

        
        function deriveKey(Email, companyCode) {
            console.log("email:", Email, "companyCode:", companyCode);
            const encoder = new TextEncoder();
            const salt = encoder.encode(companyCode);
            const iterations = 10000;
            const keyMaterial = window.crypto.subtle.importKey(
                "raw",
                encoder.encode(Email),
                { name: "PBKDF2" },
                false,
                ["deriveKey"]
        );
            return keyMaterial.then((key) => {
                return window.crypto.subtle.deriveKey(
                    {
                        name: "PBKDF2",
                        salt: salt,
                        iterations: iterations,
                        hash: "SHA-256"
                    },
                    key,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["encrypt", "decrypt"]
                )
            });
        }
        

        async function encryptData(data, key) {
            const encoder = new TextEncoder();
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            return window.crypto.subtle.encrypt(
                {
                    name: "AES-GCM",
                    iv: iv
                },
                key,
                encoder.encode(data)
            ).then((encrypted) => {
                return { encryptedData: new Uint8Array(encrypted), iv: iv };
            });
        }

        async function decryptMessage(key, ciphertext, iv) {
            // The iv value is the same as that used for encryption
        return window.crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
    }

    </script>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Creation</title>
    <link rel="stylesheet" href="{% static 'base.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2><em>Company Creation</em></h2>
            </div>
            <form  id="companyCreationForm">
            {% csrf_token %}
                
                <div class="form-group">
                    <label for="companyName"><em>Company Name</em></label>
                    <input type="text" id="companyName" name="companyName" required>
                </div>
                <div class="form-group">
                    <label for="CVRnr"><em>CVR Number</em></label>
                    <input type="number" id="CVRnr" name="CVRnr" required>
                </div>
                <div class="form-group">
                    <label for="adminEmail"><em>Admin Email</em></label>
                    <input type="email" id="adminEmail" name="adminEmail" required>
                </div>  
                
                <button type="button" class="login-button" onclick="createCompanyCode()" ><em>Create Company</em></button>
                    
                <!-- Skift /signup til det rigtige link -->
                <a href="{% url 'signup:signup' %}"><em>Back</em></a>
            </form>

            <div class="form-group">
                <label id="companyCodeLabel"> Company Code: </label>
            </div>

            <div class="form-group">
                <label for="confirmCode">Type the company code to continue:</label>
                <input type="text" id="confirmCode" disabled>
            </div>

            <button id="continueBtn" class="login-button" disabled>Continue to Sign Up</button>
        </div>
    </div>
</body>
</html> 

<script src = "https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
    
    function sanitize(string) {
        /*
        Sanitizes the input for javaScript
        */
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#x27;',
                "/": '&#x2F;',
            };
            const reg = /[&<>"'/]/ig;
            return string.replace(reg, (match)=>(map[match]));
        }
        
        // Function to create a unique company code for each company.
        async function createCompanyCode(){
            try {
                const company = document.getElementById("companyName").value;
                const email = document.getElementById("adminEmail").value;
                const CVRNumber = document.getElementById("CVRnr").value;
                
                if (!company || !email || !CVRNumber) {
                    alert('Please fill in all required fields.');
                    return;
                }
                
                // Creates the code by taking the 4 first letters in the company plus a random number from 1000-9999
                const companyCode = company.slice(0, 4) + Math.floor(1000 + Math.random()*9000);
                
                try {
                    // Awaits the key and the encrypted email
                    const derivedKey = await deriveKey(email, companyCode);
                    const encryptedEmail = await encryptData(email, derivedKey);

                    const hex = Array.from(encryptedEmail.encryptedData)
                        .map(b => b.toString(16).padStart(2, "0"))
                            .join("");
                    
                    const decrypted = await decryptMessage(
                        derivedKey,
                        encryptedEmail.encryptedData,
                        encryptedEmail.iv
                    );
                    const decoder = new TextDecoder("utf-8");

                    const formData = new FormData();
                    formData.append('companyCode', companyCode);
                    formData.append('companyName', company);
                    formData.append('encryptedEmail', Array.from(encryptedEmail.encryptedData).map(b => b.toString(16).padStart(2, "0")).join(""));
                    formData.append('iv', Array.from(encryptedEmail.iv).map(b => b.toString(16).padStart(2, "0")).join(""));
                    formData.append('CVRNumber', CVRNumber);
                    
                    try {
                        const response = await fetch("{% url 'signup:createCompany' %}", {
                            method: "POST",
                            headers: {
                                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                            },
                            body: formData
                        });

                        const companyCodeLabel = document.getElementById("companyCodeLabel");
                        const confirmInput = document.getElementById("confirmCode");
                        const continueBtn = document.getElementById("continueBtn");

                        companyCodeLabel.textContent = "Company Code: " + companyCode;
                        
                        // Enable input field
                        confirmInput.disabled = false;
                        confirmInput.focus();

                            // Check if user typed correct code
                        confirmInput.addEventListener("input", () => {
                            if (confirmInput.value === companyCode) {
                                continueBtn.disabled = false;
                            } else {
                                continueBtn.disabled = true;
                        }
                        });

                        // Redirect only after correct input
                        continueBtn.onclick = () => {
                            if (response.redirected) {
                                window.location.href = response.url;
                            }
                        };
                    } catch (fetchError) {
                        console.error('Fetch error:', fetchError);
                        alert('Network error. Please check your connection and try again.');
                    }
                } catch (encryptionError) {
                    console.error('Encryption error:', encryptionError);
                    alert('An error occurred while processing your company code. Please try again.');
                }
            } catch (error) {
                console.error('Error creating company code:', error);
                alert('An error occurred while creating the company code. Please try again.');
            }
        }

        // Creates an encryptionkey using the company email and the companycode as a salt.
        function deriveKey(Email, companyCode) {
            const encoder = new TextEncoder();
            const salt = encoder.encode(companyCode);
            const iterations = 10000;
            const keyMaterial = window.crypto.subtle.importKey(
                "raw",
                encoder.encode(Email),
                { name: "PBKDF2" },
                false,
                ["deriveKey"]
        );
            return keyMaterial.then((key) => {
                return window.crypto.subtle.deriveKey(
                    {
                        name: "PBKDF2",
                        salt: salt,
                        iterations: iterations,
                        hash: "SHA-256"
                    },
                    key,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["encrypt", "decrypt"]
                )
            });
        }
        
        // Encrypts the email using the key.
        async function encryptData(data, key) {
            const encoder = new TextEncoder();
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            return window.crypto.subtle.encrypt(
                {
                    name: "AES-GCM",
                    iv: iv
                },
                key,
                encoder.encode(data)
            ).then((encrypted) => {
                return { encryptedData: new Uint8Array(encrypted), iv: iv };
            });
        }
        // Decrypts the email using the key and the iv.
        async function decryptMessage(key, ciphertext, iv) {
            // The iv value is the same as that used for encryption
        return window.crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
    }

    </script>
